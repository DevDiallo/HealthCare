version: "3.9"

services:
  kafka:
    image: apache/kafka:latest
    container_name: healthcare-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - healthcare_net

  postgres:
    image: postgres:16-alpine
    container_name: healthcare-postgres
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare
      POSTGRES_DB: healthcare_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - healthcare_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./backend/auth-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_auth
      DB_USERNAME: healthcare
      DB_PASSWORD: healthcare
      JWT_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare_net

  hospital-service:
    build: ./backend/hospital-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_hospital
      DB_USERNAME: healthcare
      DB_PASSWORD: healthcare
      JWT_SECRET: 0123456789ABCDEF0123456789ABCDEF
      SERVER_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare_net

  patient-service:
    build: ./backend/patient-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_patient
      DB_USERNAME: healthcare
      DB_PASSWORD: healthcare
      JWT_SECRET: 0123456789ABCDEF0123456789ABCDEF
      SERVER_PORT: 8083
      DOCTOR_SERVICE_BASE_URL: http://doctor-service:8084
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare_net

  doctor-service:
    build: ./backend/doctor-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_doctor
      DB_USERNAME: healthcare
      DB_PASSWORD: healthcare
      JWT_SECRET: 0123456789ABCDEF0123456789ABCDEF
      SERVER_PORT: 8084
      PATIENT_SERVICE_BASE_URL: http://patient-service:8083
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare_net

  appointment-service:
    build: ./backend/appointment-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_appointment
      DB_USERNAME: healthcare
      DB_PASSWORD: healthcare
      JWT_SECRET: 0123456789ABCDEF0123456789ABCDEF
      SERVER_PORT: 8085
      PATIENT_SERVICE_BASE_URL: http://patient-service:8083
      DOCTOR_SERVICE_BASE_URL: http://doctor-service:8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APPOINTMENT_EVENTS_TOPIC: appointment-events
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - healthcare_net

  notification-service:
    build: ./backend/notification-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/healthcare_notification
      DB_USERNAME: healthcare
      DB_PASSWORD: healthcare
      JWT_SECRET: 0123456789ABCDEF0123456789ABCDEF
      SERVER_PORT: 8086
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APPOINTMENT_EVENTS_TOPIC: appointment-events
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - healthcare_net

  frontend:
    build: ./frontend
    networks:
      - healthcare_net

  gateway:
    build: ./gateway
    depends_on:
      - frontend
      - auth-service
      - hospital-service
      - patient-service
      - doctor-service
      - appointment-service
      - notification-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - healthcare_net

networks:
  healthcare_net:
    driver: bridge

volumes:
  postgres_data:
