worker_processes 1;

pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  upstream frontend_upstream {
    least_conn;
    server host.docker.internal:5173;
  }

  upstream auth_upstream {
    least_conn;
    server host.docker.internal:8081;
  }

  upstream hospital_upstream {
    least_conn;
    server host.docker.internal:8082;
  }

  upstream patient_upstream {
    least_conn;
    server host.docker.internal:8083;
  }

  upstream doctor_upstream {
    least_conn;
    server host.docker.internal:8084;
  }

  upstream appointment_upstream {
    least_conn;
    server host.docker.internal:8085;
  }

  upstream notification_upstream {
    least_conn;
    server host.docker.internal:8086;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 8080;
    server_name localhost;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Refresh-Token" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location = /health {
      add_header Content-Type application/json;
      return 200 '{"status":"UP","gateway":"nginx-local"}';
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/ {
      proxy_pass http://auth_upstream/api/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/hospitals/ {
      proxy_pass http://hospital_upstream/api/hospitals/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/patients/ {
      proxy_pass http://patient_upstream/api/patients/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/doctors/ {
      proxy_pass http://doctor_upstream/api/doctors/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/appointments/ {
      proxy_pass http://appointment_upstream/api/appointments/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications/ {
      proxy_pass http://notification_upstream/api/notifications/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
