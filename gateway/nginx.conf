worker_processes auto;

events {
  worker_connections 2048;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  upstream frontend_upstream {
    least_conn;
    server frontend:80;
  }

  upstream auth_upstream {
    least_conn;
    server auth-service:8081;
  }

  upstream hospital_upstream {
    least_conn;
    server hospital-service:8082;
  }

  upstream patient_upstream {
    least_conn;
    server patient-service:8083;
  }

  upstream doctor_upstream {
    least_conn;
    server doctor-service:8084;
  }

  upstream appointment_upstream {
    least_conn;
    server appointment-service:8085;
  }

  upstream notification_upstream {
    least_conn;
    server notification-service:8086;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Refresh-Token" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location = /health {
      add_header Content-Type application/json;
      return 200 '{"status":"UP","gateway":"nginx"}';
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/ {
      proxy_pass http://auth_upstream/api/auth/;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/hospitals/ {
      proxy_pass http://hospital_upstream/api/hospitals/;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/patients/ {
      proxy_pass http://patient_upstream/api/patients/;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/doctors/ {
      proxy_pass http://doctor_upstream/api/doctors/;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/appointments/ {
      proxy_pass http://appointment_upstream/api/appointments/;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications/ {
      proxy_pass http://notification_upstream/api/notifications/;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /swagger/ {
      proxy_pass http://auth_upstream/swagger-ui/;
      include /etc/nginx/proxy_params;
    }

    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
      default_type application/json;
      return 500 '{"success":false,"message":"Gateway upstream error"}';
    }
  }
}
