spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/healthcare_notification}
    username: ${DB_USERNAME:healthcare}
    password: ${DB_PASSWORD:healthcare}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8086}

app:
  jwt-secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  kafka:
    appointment-topic: ${APPOINTMENT_EVENTS_TOPIC:appointment-events}
