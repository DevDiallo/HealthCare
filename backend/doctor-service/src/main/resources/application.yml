spring:
  application:
    name: doctor-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/healthcare_doctor}
    username: ${DB_USERNAME:healthcare}
    password: ${DB_PASSWORD:healthcare}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8084}

app:
  jwt-secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  patient-service-base-url: ${PATIENT_SERVICE_BASE_URL:http://patient-service}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
